<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedPub Buddies - Submit Your Work</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

header {
    background: linear-gradient(90deg, #1e88e5, #1565c0);
    color: white;
    padding: 40px;
    text-align: center;
}

nav {
    background: white;
    padding: 15px;
    text-align: center;
}

nav a {
    margin: 10px;
    text-decoration: none;
    color: #1e88e5;
    font-weight: bold;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

form {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    background: #1e88e5;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #0d47a1;
}
</style>

</head>


<body>


<header>
<h1>Submit Your Work</h1>
<p>Manuscript & Abstract Submission Portal</p>
</header>


<nav>
<a href="index.html">Home</a>
<a href="journals.html">Journals</a>
<a href="submit.html">Submit</a>
<a href="publish.html">Publish</a>
</nav>


<div class="container">

<form id="submissionForm">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="title" placeholder="Title of Work" required>


<select name="type" required>
<option value="">Select Type</option>
<option value="Abstract">Abstract</option>
<option value="Manuscript">Manuscript</option>
</select>


<textarea name="message" placeholder="Message" required></textarea>


<button type="submit">
Submit
</button>


</form>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


<script>

// Supabase connection

const supabaseUrl = "https://ouuoaxjadcqqvgxoyrxt.supabase.co";


// PASTE YOUR SUPABASE PUBLISHABLE KEY BETWEEN THE QUOTES BELOW

const supabaseKey = "sb_publishable_wNmfSu7S6tHvpso2W5_bGQ_0efriHc2";


const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);



const form = document.getElementById("submissionForm");


form.addEventListener("submit", async function(e){

e.preventDefault();


const formData = new FormData(form);


const { error } = await supabaseClient
.from("submissions")
.insert([
{
name: formData.get("name"),
email: formData.get("email"),
title: formData.get("title"),
type: formData.get("type"),
message: formData.get("message")
}
]);


if(error){

alert("Error: " + error.message);

} else {

alert("Submitted successfully!");

form.reset();

}

});


</script>


</body>
</html>
